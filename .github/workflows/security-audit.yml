name: Security Audit

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    # Enforcing: a vulnerable dependency change fails the check. If a specific
    # advisory is unfixable/transitive, add `--ignore-vuln <ID>` to the command below.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r backend/requirements.txt
