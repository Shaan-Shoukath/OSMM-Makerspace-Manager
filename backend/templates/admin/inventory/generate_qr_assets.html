{% extends "admin/base_site.html" %}

{% block content %}
<form method="post" action="{{ request.path }}">
  {% csrf_token %}
  <input type="hidden" name="action" value="{{ action_name }}">
  {% for obj in queryset %}
    <input type="hidden" name="{{ action_checkbox_name }}" value="{{ obj.pk }}">
  {% endfor %}

  <fieldset class="module aligned">
    <div class="form-row">
      <label for="id_count">Quantity:</label>
      <input id="id_count" type="number" name="count" min="1" max="200" required>
    </div>
    <div class="form-row">
      <label for="id_name_prefix">Name prefix:</label>
      <input id="id_name_prefix" type="text" name="name_prefix">
    </div>
    <div class="form-row">
      <label for="id_serial_numbers">Serial numbers:</label>
      <textarea id="id_serial_numbers" name="serial_numbers" rows="5"></textarea>
      <p class="help">Optional. Enter one serial number per line or separate them with commas.</p>
    </div>
    <div class="form-row">
      <label for="id_print_batch_id">Print batch ID:</label>
      <input id="id_print_batch_id" type="number" name="print_batch_id" min="1">
    </div>
    <div class="form-row">
      <label for="id_create_print_batch">Create print batch:</label>
      <input id="id_create_print_batch" type="checkbox" name="create_print_batch" value="1">
    </div>
  </fieldset>

  <div class="submit-row">
    <input type="submit" name="apply" value="Generate QR assets">
  </div>
</form>
{% endblock %}
