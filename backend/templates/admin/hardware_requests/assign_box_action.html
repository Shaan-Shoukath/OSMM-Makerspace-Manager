{% extends "admin/base_site.html" %}

{% block content %}
<form method="post" action="{{ request.path }}">
  {% csrf_token %}
  <input type="hidden" name="action" value="{{ action_name }}">

  <fieldset class="module aligned">
    {% for obj in queryset %}
      <input type="hidden" name="{{ action_checkbox_name }}" value="{{ obj.pk }}">
      <div class="form-row">
        <label for="id_box_code_{{ obj.pk }}">Request {{ obj.pk }}:</label>
        <input id="id_box_code_{{ obj.pk }}" type="text" name="box_code_{{ obj.pk }}">
      </div>
    {% endfor %}
  </fieldset>

  <div class="submit-row">
    <input type="submit" name="apply" value="Assign boxes">
  </div>
</form>
{% endblock %}
